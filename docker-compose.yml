services:
  openclaw-gateway:
    image: coollabsio/openclaw:latest
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      AUTH_USERNAME: ${AUTH_USERNAME}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENCLAW_PLUGINS: ${OPENCLAW_PLUGINS}
      OPENCLAW_GATEWAY_BIND: lan
      TZ: UTC
      OPENCLAW_ALLOWED_ORIGINS: "https://oc.emlaksehri.com"
      OPENCLAW_TRUSTED_PROXIES: "127.0.0.1"
      OPENCLAW_CONTROL_UI_ALLOW_INSECURE_AUTH: "true"
    volumes:
      - openclaw_config:/data/.openclaw
      - openclaw_workspace:/data/.openclaw/workspace
    ports:
      - "18789:8080"
    depends_on:
      - browser
    init: true
    restart: unless-stopped

  browser:
    image: ghcr.io/browserless/chromium:latest
    restart: unless-stopped
    environment:
      CONCURRENT: "5"
      TIMEOUT: "60000"
      ALLOW_GET: "true"

volumes:
  openclaw_config:
  openclaw_workspace:
